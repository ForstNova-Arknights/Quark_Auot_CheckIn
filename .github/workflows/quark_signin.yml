name: Quark签到

on:
  schedule:
    - cron: '0 1 * * *'   # 北京时间 09:00
    - cron: '0 5 * * *'   # 北京时间 13:00
  workflow_dispatch:      # 允许手动触发

jobs:
  check-if-already-signed:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: 获取今日日期（北京时间）
        run: echo "TODAY=$(TZ='Asia/Shanghai' date '+%Y-%m-%d')" >> $GITHUB_ENV

      - name: 检查今日是否已有签到成功的缓存
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: .dummy_marker
          key: quark-sign-success-${{ env.TODAY }}

      - name: 决定是否跳过
        id: check
        run: |
          if [ "${{ steps.cache-restore.outputs.cache-hit }}" = "true" ]; then
            echo "今天已成功签到，跳过执行。"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "今天尚未签到，继续执行。"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

  sign-in:
    needs: check-if-already-signed
    if: needs.check-if-already-signed.outputs.skip == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 随机延迟（早上）
        if: github.event.schedule == '0 1 * * *'
        run: |
          delay=$((RANDOM % 60))
          echo "早上签到，延迟 $delay 秒后开始.."
          sleep $delay

      - name: 随机延迟（下午/手动触发）
        if: github.event.schedule == '0 5 * * *' || github.event_name == 'workflow_dispatch'
        run: |
          delay=$((RANDOM % 30))
          echo "下午兜底或手动触发，延迟 $delay 秒后开始.."
          sleep $delay

      - name: 设置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: 安装依赖
        run: pip install requests

      - name: 执行签到脚本
        env:
          COOKIE_QUARK: ${{ secrets.COOKIE_QUARK }}
        run: python checkIn_Quark.py

      - name: 记录今日签到成功缓存
        if: success()
        uses: actions/cache@v4
        with:
          path: .dummy_marker
          key: quark-sign-success-${{ env.TODAY || 'default' }}

      - name: 获取今日日期（用于空提交）
        if: success() && github.event_name == 'schedule'
        run: echo "TODAY=$(TZ='Asia/Shanghai' date '+%Y-%m-%d')" >> $GITHUB_ENV

      - name: 空提交保持活跃
        if: success() && github.event_name == 'schedule'
        run: |
          git config --local user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git config --local user.name "${{ github.actor }}"
          git remote set-url origin https://${{ github.actor }}:${{ github.token }}@github.com/${{ github.repository }}
          git pull --rebase --autostash
          git commit --allow-empty -m "CHORE: 保持运行.."
          git push

      - name: 清理旧的工作流记录
        uses: Mattraks/delete-workflow-runs@main
        if: always()
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 60
